# MLPerf Optimizer Environment Configuration

# Environment Configuration
environment:
  name: "mlperf_optimizer"
  group_size: 8  # Number of rollouts per query
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  total_steps: 1000
  batch_size: 8
  steps_per_eval: 50
  max_token_length: 2048
  wandb_name: "mlperf_optimizer"

# Model Configuration
model:
  name: "NousResearch/DeepHermes-3-Llama-3-3B-Preview"
  port: 9001

# Training Configuration
training:
  learning_rate: 1.0e-5
  training_steps: 500
  batch_size: 4
  sequence_length: 2048
  device: "cuda"
  save_path: "./checkpoints"
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  advantage_clip: 10.0
  kl_coef: 0.1
  save_interval: 50
  vllm_restart_interval: 100
  warmup_steps: 100
  gradient_accumulation_steps: 8
  log_interval: 10

# Evaluation Configuration
evaluation:
  num_examples: 25
  output_dir: "artifacts"